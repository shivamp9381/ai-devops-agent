<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DevOps Agent</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div class="app">

    <header>
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">⚙️</span>
                <h1>AI DevOps Agent</h1>
            </div>
            <p class="subtitle">
                Analyze GitHub repos or ZIP uploads and generate DevOps assets instantly.
            </p>

            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </header>

    <main>

        <section class="input-section">

            <div class="tabs">
                <button class="tab active" data-tab="repo">GitHub URL</button>
                <button class="tab" data-tab="upload">Upload ZIP</button>
            </div>

            <div class="tab-content active" id="tab-repo">
                <form id="repoForm">
                    <input type="url" id="repoUrl" placeholder="https://github.com/user/project" required>
                    <button type="submit" class="btn-primary" id="repoBtn">
                        <span class="btn-text">🔍 Analyze Repository</span>
                        <span class="spinner hidden"></span>
                    </button>
                </form>
            </div>

            <div class="tab-content" id="tab-upload">
                <form id="uploadForm">
                    <div class="drop-zone" id="dropZone">
                        <p>📁 Drag & drop ZIP here or click to browse</p>
                        <input type="file" id="fileInput" accept=".zip" hidden>
                        <span class="file-name" id="fileName"></span>
                    </div>

                    <button type="submit" class="btn-primary" id="uploadBtn" disabled>
                        <span class="btn-text">📦 Analyze Upload</span>
                        <span class="spinner hidden"></span>
                    </button>
                </form>
            </div>

        </section>

        <div class="error-msg hidden" id="errorMsg"></div>
        <div class="toast hidden" id="toast"></div>

        <section class="results hidden" id="results">

            <div class="result-header">
                <h2>Analysis Results</h2>

                <div class="header-actions">
                    <div class="stack-badge" id="stackBadge"></div>
                    <button class="zip-btn" onclick="downloadAllZip()">📦 Download ZIP</button>
                </div>
            </div>

            <div class="result-grid">

                <!-- Dockerfile -->
                <div class="result-card">
                    <div class="card-header">
                        <h3>🐳 Dockerfile</h3>
                        <div class="card-actions">
                            <button class="copy-btn" data-target="dockerfile">📋 Copy</button>
                            <button class="download-btn" onclick="downloadGeneratedFile('Dockerfile','dockerfile')">📥</button>
                        </div>
                    </div>
                    <pre><code id="dockerfile"></code></pre>
                </div>

                <!-- Compose -->
                <div class="result-card">
                    <div class="card-header">
                        <h3>🐙 Docker Compose</h3>
                        <div class="card-actions">
                            <button class="copy-btn" data-target="compose">📋 Copy</button>
                            <button class="download-btn" onclick="downloadGeneratedFile('docker-compose.yml','compose')">📥</button>
                        </div>
                    </div>
                    <pre><code id="compose"></code></pre>
                </div>

                <!-- ENV -->
                <div class="result-card">
                    <div class="card-header">
                        <h3>🔐 .env.example</h3>
                        <div class="card-actions">
                            <button class="copy-btn" data-target="env">📋 Copy</button>
                            <button class="download-btn" onclick="downloadGeneratedFile('.env.example','env')">📥</button>
                        </div>
                    </div>
                    <pre><code id="env"></code></pre>
                </div>

                <!-- Actions -->
                <div class="result-card">
                    <div class="card-header">
                        <h3>🚀 GitHub Actions</h3>
                        <div class="card-actions">
                            <button class="copy-btn" data-target="githubActions">📋 Copy</button>
                            <button class="download-btn" onclick="downloadGeneratedFile('workflow.yml','githubActions')">📥</button>
                        </div>
                    </div>
                    <pre><code id="githubActions"></code></pre>
                </div>

                <!-- Deploy -->
                <div class="result-card full-width">
                    <div class="card-header">
                        <h3>📋 Deployment Steps</h3>
                        <div class="card-actions">
                            <button class="copy-btn" data-target="deploySteps">📋 Copy</button>
                            <button class="download-btn" onclick="downloadGeneratedFile('deployment-steps.txt','deploySteps')">📥</button>
                        </div>
                    </div>
                    <div class="deploy-steps" id="deploySteps"></div>
                </div>

                <!-- Recommendations -->
                <div class="result-card full-width">
                    <div class="card-header">
                        <h3>💡 Recommendations</h3>
                    </div>
                    <ul class="recommendations" id="recommendations"></ul>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <p>Built with Spring Boot + Groq AI</p>
    </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
